name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Evaluate Merge Risk
        id: claude-gate
        timeout-minutes: 10
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Apply the repository rules from CLAUDE.md, especially:
            - no new TypeScript any
            - never expose DB entities directly in services
            - keep business logic out of handlers/services when CDS should handle it
            - prioritize correctness, regression risk, security, missing tests, and repo rule violations

            Return structured output only.
            Mark has_blocker true only if the PR contains at least one issue that should block merge.
            Keep summary to one sentence.
          claude_args: |
            --max-turns 4
            --json-schema {"type":"object","properties":{"has_blocker":{"type":"boolean"},"summary":{"type":"string"},"reason":{"type":"string"}},"required":["has_blocker","summary"]}

      - name: Fail if Claude found a blocker
        if: fromJSON(steps.claude-gate.outputs.structured_output).has_blocker == true
        run: |
          echo "Claude marked this PR as not safe to merge."
          echo "Summary: ${{ fromJSON(steps.claude-gate.outputs.structured_output).summary }}"
          exit 1

